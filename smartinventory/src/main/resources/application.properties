spring.application.name=smartinventory

# Active Profile
spring.profiles.active=dev

# Server Port
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1912
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret Configuration (must be Base64 encoded, at least 256 bits)
jwt.secret=SmFydkludmVudG9yeVNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNA==
jwt.expiration=86400000

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.inventory.smartinventory=DEBUG
logging.level.org.hibernate.SQL=DEBUG